<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victor G — Edição de Vídeos / Gaming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0b0b0d;
    --charcoal:#17151a;
    --charcoal-2:#1f1c22;
    --ember:#ff5f1f;
    --ember-deep:#c2410c;
    --bone:#f3ede2;
    --ash:#948f97;
    --line: rgba(243,237,226,0.10);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{scroll-behavior:smooth;}

  body{
    background:var(--void);
    color:var(--bone);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
  }

  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ember);
  }

  /* ---------- HERO ---------- */

  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    isolation:isolate;
  }

  .hero-bg{
    position:absolute;
    inset:-40px;
    z-index:-2;
    background-image:url('bg.jpg');
    background-size:cover;
    background-position:center 65%;
    filter:blur(7px) saturate(0.9) brightness(0.55);
    transform:scale(1.05);
  }

  .hero-overlay{
    position:absolute;
    inset:0;
    z-index:-1;
    background:
      linear-gradient(180deg, rgba(11,11,13,0.35) 0%, rgba(11,11,13,0.55) 45%, var(--void) 96%),
      linear-gradient(100deg, rgba(194,65,12,0.28) 0%, rgba(11,11,13,0) 55%);
  }

  .hero-inner{
    padding: 8vh clamp(20px, 6vw, 72px) 0;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .hero-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 28px clamp(20px, 6vw, 72px);
    position:absolute;
    top:0; left:0; right:0;
  }

  .mark{
    font-family:'Space Mono', monospace;
    font-size:0.78rem;
    letter-spacing:0.15em;
    color:var(--bone);
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:2px;
    background:rgba(11,11,13,0.35);
    backdrop-filter: blur(4px);
  }

  .mark b{color:var(--ember);font-weight:700;}

  h1.title{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:clamp(4.2rem, 15vw, 11rem);
    line-height:0.86;
    letter-spacing:0.01em;
    color:var(--bone);
    text-shadow: 0 8px 40px rgba(0,0,0,0.45);
    opacity:0;
    transform:translateY(18px);
    animation: rise 0.9s cubic-bezier(.2,.7,.3,1) 0.15s forwards;
  }

  .subtitle{
    font-family:'Space Mono', monospace;
    font-size:clamp(0.85rem, 1.6vw, 1.05rem);
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ash);
    padding-left:4px;
    opacity:0;
    animation: rise 0.9s cubic-bezier(.2,.7,.3,1) 0.35s forwards;
  }

  .subtitle span{color:var(--ember);}

  @keyframes rise{
    to{opacity:1; transform:translateY(0);}
  }

  /* timecode scrub bar - signature element */
  .scrub{
    margin-top:6vh;
    display:flex;
    align-items:center;
    gap:14px;
    padding: 0 clamp(20px, 6vw, 72px) 0;
  }

  .scrub-time{
    font-family:'Space Mono', monospace;
    font-size:0.75rem;
    color:var(--ash);
    white-space:nowrap;
  }

  .scrub-track{
    position:relative;
    flex:1;
    height:26px;
    display:flex;
    align-items:center;
  }

  .scrub-track::before{
    content:"";
    position:absolute;
    left:0;right:0;top:50%;
    height:1px;
    background:var(--line);
  }

  .scrub-ticks{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .scrub-ticks i{
    width:1px;
    height:10px;
    background:var(--line);
  }
  .scrub-ticks i:nth-child(4n+1){height:16px;background:rgba(243,237,226,0.22);}

  .scrub-head{
    position:absolute;
    left:22%;
    top:50%;
    transform:translate(-50%,-50%);
    width:12px;height:12px;
    background:var(--ember);
    border-radius:2px;
    box-shadow:0 0 0 5px rgba(255,95,31,0.15);
  }

  .scroll-cue{
    font-family:'Space Mono', monospace;
    font-size:0.68rem;
    color:var(--ash);
    letter-spacing:0.18em;
    text-transform:uppercase;
    padding: 22px clamp(20px, 6vw, 72px) 30px;
  }

  /* ---------- WORK SECTION ---------- */

  .work{
    padding: 110px clamp(20px, 6vw, 72px) 60px;
    background:var(--void);
  }

  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    margin-bottom:48px;
    border-bottom:1px solid var(--line);
    padding-bottom:22px;
  }

  h2.section-title{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:clamp(2.4rem, 5vw, 3.6rem);
    letter-spacing:0.01em;
    color:var(--bone);
  }

  .section-count{
    font-family:'Space Mono', monospace;
    font-size:0.78rem;
    color:var(--ash);
    text-align:right;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:22px;
  }

  @media (max-width:720px){
    .grid{grid-template-columns:1fr;}
  }

  .card{
    position:relative;
    aspect-ratio:16/10;
    border-radius:4px;
    overflow:hidden;
    background:var(--charcoal);
    border:1px solid var(--line);
    cursor:pointer;
    isolation:isolate;
  }

  .card-bg{
    position:absolute;
    inset:0;
    background-image:url('bg.jpg');
    background-size:cover;
    background-position:center;
    filter:blur(1.5px) brightness(0.5) saturate(0.85);
    transform:scale(1.08);
    transition:transform 0.5s ease, filter 0.5s ease;
  }

  .card:nth-child(1) .card-bg{ filter:blur(1.5px) brightness(0.42) saturate(0.9) hue-rotate(0deg); }
  .card:nth-child(2) .card-bg{ filter:blur(1.5px) brightness(0.46) saturate(0.75) hue-rotate(-6deg); }
  .card:nth-child(3) .card-bg{ filter:blur(1.5px) brightness(0.4) saturate(1) hue-rotate(4deg); }
  .card:nth-child(4) .card-bg{ filter:blur(1.5px) brightness(0.48) saturate(0.7) hue-rotate(-3deg); }

  .card-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(11,11,13,0.15) 0%, rgba(11,11,13,0.85) 100%);
  }

  .card-meta{
    position:absolute;
    left:0;right:0;bottom:0;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
  }

  .card-title{
    font-family:'Bebas Neue', sans-serif;
    font-size:1.5rem;
    letter-spacing:0.01em;
    color:var(--bone);
  }

  .card-tag{
    font-family:'Space Mono', monospace;
